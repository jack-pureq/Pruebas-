<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waqrapfuko</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #D32F2F;
            --secondary: #FFC107;
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-dim: #AAAAAA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px; text-align: center; background: var(--surface); border-bottom: 1px solid #333; flex-shrink: 0; }
        header h1 { font-size: 1.4rem; color: var(--secondary); letter-spacing: 2px; }

        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; align-items: center; }
        .content.active { display: flex; }

        .album-art { width: 180px; height: 180px; background: #333; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: var(--text-dim); box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0;}
        .song-info { text-align: center; margin-bottom: 15px; width: 100%; flex-shrink: 0;}
        .song-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { color: var(--text-dim); font-size: 0.9rem; }

        /* VUMETER CAJONADO */
        .vumeter-container { 
            display: flex; justify-content: center; align-items: flex-end; gap: 3px; 
            height: 50px; width: 100%; margin-bottom: 20px; overflow: hidden; flex-shrink: 0;
        }
        .bar { width: 6px; height: 2px; background: var(--secondary); border-radius: 3px; transition: height 0.05s ease; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; flex-shrink: 0;}
        .btn { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .btn:hover, .btn.active { color: var(--secondary); }
        .btn-play { background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4); }

        .progress-container { width: 100%; margin-bottom: 15px; flex-shrink: 0;}
        .progress-bar { width: 100%; height: 6px; background: #444; border-radius: 3px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; width: 0%; pointer-events: none; }
        .time-stamps { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }

        .extra-controls { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; -webkit-appearance: none; background: #444; height: 4px; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--secondary); border-radius: 50%; cursor: pointer; }

        .playlist-btn { background: var(--surface); border: 1px solid #444; color: var(--text); padding: 15px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold;}
        .playlist-container { width: 100%; margin-top: 15px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
        .playlist-item { padding: 10px; background: var(--surface); margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.9rem; }
        .playlist-item:hover { background: #333; }

        /* Sección Radio */
        .radio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .radio-station { background: var(--surface); padding: 20px 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .radio-station.active { border-color: var(--primary); background: #2a1010; }
        .radio-station.error { border-color: #F44336; opacity: 0.5; pointer-events: none; }
        .radio-station i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; display: block; }
        .radio-name { font-size: 0.9rem; font-weight: bold; }

        /* NAVEGACIÓN INFERIOR GRANDE Y CLARA */
        nav { 
            background: #000; 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0 20px 0; 
            border-top: 2px solid #333; 
            flex-shrink: 0;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: #666; cursor: pointer; font-size: 0.9rem; font-weight: bold;
            padding: 10px 30px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-item i { font-size: 1.8rem; margin-bottom: 5px; }
        .nav-item.active { color: var(--secondary); background: rgba(255, 193, 7, 0.1); }

        .eq-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .eq-overlay.show { display: flex; }
        .eq-sliders { display: flex; gap: 15px; }
        .eq-slider-group { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-dim);}
        .eq-slider-group input[type="range"] { writing-mode: vertical-lr; direction: rtl; height: 100px; width: 6px; }
        
        #loading-db { color: var(--secondary); margin-top: 10px; font-size: 0.9rem; display: none; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-bullhorn"></i> WAQRAFUKO</h1>
    </header>

    <!-- SECCIÓN MÚSICA -->
    <div id="sec-music" class="content active">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <div class="song-info">
            <div class="song-title" id="song-title">Sin música seleccionada</div>
            <div class="song-artist" id="song-artist">Agrega tus canciones abajo</div>
        </div>

        <div class="vumeter-container" id="vumeter"></div>

        <div class="controls">
            <button class="btn" id="btn-shuffle" title="Aleatorio"><i class="fas fa-random"></i></button>
            <button class="btn" id="btn-prev"><i class="fas fa-backward"></i></button>
            <button class="btn btn-play" id="btn-play-music"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-next"><i class="fas fa-forward"></i></button>
            <button class="btn" id="btn-fav-music" title="Favorito"><i class="far fa-heart"></i></button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-stamps">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="extra-controls">
            <div class="slider-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="vol-music" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
            <button class="btn" id="btn-eq" style="font-size: 1rem; color: var(--text-dim);"><i class="fas fa-sliders-h"></i> Ecualizador</button>
            
            <button class="playlist-btn" id="btn-load-files"><i class="fas fa-plus-circle"></i> Seleccionar Canciones</button>
            <!-- Cambié a "multiple" en vez de "webkitdirectory" para evitar congelamiento en celular -->
            <input type="file" id="file-input" multiple accept="audio/*" style="display: none;">
            
            <div id="loading-db"><i class="fas fa-spinner fa-spin"></i> Guardando canción... por favor espera.</div>
            
            <div style="width: 100%; margin-top:15px; display: flex; justify-content: space-between; align-items: center;">
                <span style="color:var(--secondary)"><i class="fas fa-list"></i> Biblioteca:</span>
                <button class="btn" id="btn-show-favs" style="font-size: 0.9rem; color: var(--text-dim);">Ver Favoritos</button>
            </div>
            <div class="playlist-container" id="playlist-container"></div>
        </div>
    </div>

    <!-- SECCIÓN RADIO (ACÁ ESTÁ LA RADIO) -->
    <div id="sec-radio" class="content">
        <h2 style="margin-bottom: 20px; color: var(--secondary);"><i class="fas fa-broadcast-tower"></i> Radios de Perú</h2>
        
        <div class="radio-grid" id="radio-grid"></div>

        <div class="controls">
            <button class="btn" id="btn-prev-radio"><i class="fas fa-backward"></i></button>
            <button class="btn btn-play" id="btn-play-radio"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-next-radio"><i class="fas fa-forward"></i></button>
            <button class="btn" id="btn-fav-radio" title="Favorito"><i class="far fa-heart"></i></button>
        </div>

        <div class="extra-controls" style="margin-top: 20px;">
            <div class="slider-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="vol-radio" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>
    </div>

    <!-- Ecualizador Overlay -->
    <div class="eq-overlay" id="eq-overlay">
        <h2>Ecualizador</h2>
        <div class="eq-sliders">
            <div class="eq-slider-group"><span>60Hz</span><input type="range" class="eq-band" data-freq="60" min="-12" max="12" value="0"><span class="eq-val">0dB</span></div>
            <div class="eq-slider-group"><span>230Hz</span><input type="range" class="eq-band" data-freq="230" min="-12" max="12" value="0"><span class="eq-val">0dB</span></div>
            <div class="eq-slider-group"><span>910Hz</span><input type="range" class="eq-band" data-freq="910" min="-12" max="12" value="0"><span class="eq-val">0dB</span></div>
            <div class="eq-slider-group"><span>4kHz</span><input type="range" class="eq-band" data-freq="4000" min="-12" max="12" value="0"><span class="eq-val">0dB</span></div>
            <div class="eq-slider-group"><span>14kHz</span><input type="range" class="eq-band" data-freq="14000" min="-12" max="12" value="0"><span class="eq-val">0dB</span></div>
        </div>
        <button class="btn" id="btn-close-eq" style="font-size: 1.5rem; color: var(--primary); margin-top: 20px;"><i class="fas fa-times-circle"></i> Cerrar</button>
    </div>

    <!-- MENÚ INFERIOR CLARO -->
    <nav>
        <div class="nav-item active" data-sec="sec-music"><i class="fas fa-compact-disc"></i>Música</div>
        <div class="nav-item" data-sec="sec-radio"><i class="fas fa-radio"></i>Radio</div>
    </nav>

    <audio id="audio-music" preload="auto"></audio>
    <audio id="audio-radio" preload="none"></audio>

<script>
    const audioMusic = document.getElementById('audio-music');
    const audioRadio = document.getElementById('audio-radio');
    let playlist = [];
    let currentTrackIndex = 0;
    let isShuffle = false;
    let favoritesMusic = JSON.parse(localStorage.getItem('favMusic')) || [];
    let favoritesRadio = JSON.parse(localStorage.getItem('favRadio')) || [];
    let showingFavs = false;
    let db;

    let audioCtx, analyser, source, eqFilters = [];
    let audioContextInit = false;

    const radioStations = [
        { name: "Radio Hit Perú", url: "https://sonic.clikstreaming.com/8070/stream", city: "Lima" },
        { name: "Radio Ritmo", url: "https://stream.zeno.fm/80r28nzf2v8uv", city: "Perú" },
        { name: "Radio Bella 96.1", url: "https://stream.zeno.fm/hmm0yndq1a8uv", city: "Perú" },
        { name: "Radio Oasis", url: "https://24293.live.streamtheworld.com/OASIS_PERU_SC", city: "Lima" },
        { name: "RPP (Prueba)", url: "https://streaming.rpp.com.pe/stream/rpp.mp3", city: "Lima" },
        { name: "Moda (Prueba)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/RADIOMODA.mp3", city: "Lima" }
    ];
    let currentStationIndex = 0;

    // --- BASE DE DATOS (INDEXED DB) ---
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("WaqrapfukoDB", 1);
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains("songs")) {
                    database.createObjectStore("songs", { keyPath: "name" });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject("Error DB");
        });
    }

    // FUNCIÓN ANTI-CONGELAMIENTO: Guarda canción por canción con pausas
    async function saveSongsToDB(files) {
        const loadingEl = document.getElementById('loading-db');
        loadingEl.style.display = 'block';
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const name = file.name.replace(/\.[^/.]+$/, "");
            
            // Mostrar progreso real
            loadingEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Guardando ${i + 1} de ${files.length}...`;
            
            // Pequeña pausa para que el celular no se congele
            await new Promise(r => setTimeout(r, 50));
            
            await new Promise((resolve, reject) => {
                const tx = db.transaction("songs", "readwrite");
                const store = tx.objectStore("songs");
                store.put({ name: name, blob: file }); // PUT actualiza si existe
                tx.oncomplete = resolve;
                tx.onerror = reject;
            });
        }
        
        loadingEl.style.display = 'none';
        await loadPlaylistFromDB();
    }

    async function loadPlaylistFromDB() {
        return new Promise((resolve) => {
            const tx = db.transaction("songs", "readonly");
            const store = tx.objectStore("songs");
            const request = store.getAll();

            request.onsuccess = () => {
                playlist.forEach(p => URL.revokeObjectURL(p.url)); // Limpiar memoria vieja
                playlist = request.result.map(song => ({ name: song.name, url: URL.createObjectURL(song.blob) }));
                
                if (playlist.length > 0) {
                    document.getElementById('song-title').textContent = playlist[0].name;
                    document.getElementById('song-artist').textContent = `${playlist.length} canciones guardadas`;
                } else {
                    document.getElementById('song-title').textContent = "Sin música guardada";
                    document.getElementById('song-artist').textContent = "Presiona 'Seleccionar Canciones'";
                }
                renderPlaylist();
                resolve();
            };
        });
    }

    // --- INICIO ---
    document.addEventListener('DOMContentLoaded', async () => {
        createVumeter();
        renderRadioStations();
        setupEventListeners();
        initMediaSession();
        
        try {
            await initDB();
            await loadPlaylistFromDB();
        } catch(e) {
            document.getElementById('song-artist').textContent = "Error al cargar base de datos";
        }
    });

    // --- NAVEGACIÓN INFERIOR ---
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(e.currentTarget.dataset.sec).classList.add('active');
            
            if(e.currentTarget.dataset.sec === 'sec-radio') audioMusic.pause();
            if(e.currentTarget.dataset.sec === 'sec-music') audioRadio.pause();
        });
    });

    // --- WEB AUDIO API ---
    function initAudioContext() {
        if (audioContextInit) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(audioMusic);
        
        [60, 230, 910, 4000, 14000].forEach(freq => {
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking'; filter.frequency.value = freq; filter.Q.value = 1; filter.gain.value = 0;
            eqFilters.push(filter);
        });

        source.connect(eqFilters[0]);
        for(let i=0; i<eqFilters.length -1; i++) eqFilters[i].connect(eqFilters[i+1]);
        eqFilters[eqFilters.length - 1].connect(analyser);
        analyser.connect(audioCtx.destination);
        audioContextInit = true;
        drawVumeter();
    }

    // --- VUMETER ---
    function createVumeter() {
        const container = document.getElementById('vumeter');
        for(let i=0; i<20; i++) { const bar = document.createElement('div'); bar.className = 'bar'; container.appendChild(bar); }
    }

    function drawVumeter() {
        if(!analyser) return;
        requestAnimationFrame(drawVumeter);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        const bars = document.querySelectorAll('.bar');
        const step = Math.floor(dataArray.length / bars.length);
        bars.forEach((bar, index) => {
            const height = Math.max(2, (dataArray[index * step] / 255) * 45);
            bar.style.height = `${height}px`;
            bar.style.background = height < 15 ? '#4CAF50' : height < 30 ? '#FFC107' : '#D32F2F';
        });
    }

    // --- CARGA DE MÚSICA ---
    document.getElementById('btn-load-files').addEventListener('click', () => document.getElementById('file-input').click());

    document.getElementById('file-input').addEventListener('change', (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
        if(files.length === 0) return;
        saveSongsToDB(files);
        e.target.value = '';
    });

    function loadTrack(index) {
        if (index < 0 || index >= playlist.length) return;
        currentTrackIndex = index;
        const track = playlist[index];
        document.getElementById('song-title').textContent = track.name;
        document.getElementById('song-artist').textContent = `Canción ${index + 1} de ${playlist.length}`;
        audioMusic.src = track.url;
        initAudioContext();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        audioMusic.play().catch(e => console.log("Error reproduciendo", e));
        updatePlayButton('music', true);
        updateFavIcon();
    }

    // --- CONTROLES ---
    document.getElementById('btn-play-music').addEventListener('click', () => {
        if (playlist.length === 0) return alert("No hay canciones. Selecciona tus MP3 primero.");
        initAudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audioMusic.paused) { audioMusic.play(); updatePlayButton('music', true); }
        else { audioMusic.pause(); updatePlayButton('music', false); }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        if (playlist.length === 0) return;
        let next = isShuffle ? Math.floor(Math.random() * playlist.length) : currentTrackIndex + 1;
        if (next >= playlist.length) next = 0;
        loadTrack(next);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        if (playlist.length === 0) return;
        let prev = currentTrackIndex - 1;
        if (prev < 0) prev = playlist.length - 1;
        loadTrack(prev);
    });

    document.getElementById('btn-shuffle').addEventListener('click', (e) => {
        isShuffle = !isShuffle;
        e.currentTarget.classList.toggle('active', isShuffle);
    });

    audioMusic.addEventListener('timeupdate', () => {
        if (audioMusic.duration) {
            document.getElementById('progress-fill').style.width = `${(audioMusic.currentTime / audioMusic.duration) * 100}%`;
            document.getElementById('current-time').textContent = formatTime(audioMusic.currentTime);
            document.getElementById('total-time').textContent = formatTime(audioMusic.duration);
        }
    });
    audioMusic.addEventListener('ended', () => document.getElementById('btn-next').click());
    
    document.getElementById('progress-bar').addEventListener('click', (e) => {
        if(!audioMusic.duration) return;
        audioMusic.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audioMusic.duration;
    });

    document.getElementById('vol-music').addEventListener('input', (e) => audioMusic.volume = e.target.value);

    // --- FAVORITOS ---
    document.getElementById('btn-fav-music').addEventListener('click', () => {
        if (playlist.length === 0) return;
        const name = playlist[currentTrackIndex].name;
        const i = favoritesMusic.indexOf(name);
        if (i > -1) favoritesMusic.splice(i, 1); else favoritesMusic.push(name);
        localStorage.setItem('favMusic', JSON.stringify(favoritesMusic));
        updateFavIcon();
    });

    document.getElementById('btn-show-favs').addEventListener('click', () => {
        showingFavs = !showingFavs;
        document.getElementById('btn-show-favs').innerHTML = showingFavs ? 'Ver Todas' : 'Ver Favoritos';
        renderPlaylist();
    });

    function updateFavIcon() {
        if (playlist.length === 0) return;
        const isFav = favoritesMusic.includes(playlist[currentTrackIndex].name);
        document.querySelector('#btn-fav-music i').className = isFav ? 'fas fa-heart' : 'far fa-heart';
        document.getElementById('btn-fav-music').classList.toggle('active', isFav);
    }

    function renderPlaylist() {
        const container = document.getElementById('playlist-container');
        container.innerHTML = '';
        let listToShow = showingFavs ? favoritesMusic : playlist.map(t => t.name);
        if (listToShow.length === 0) {
            container.innerHTML = `<p style="color:var(--text-dim); text-align:center; width:100%">${showingFavs ? 'No hay favoritos.' : 'Lista vacía.'}</p>`;
            return;
        }
        listToShow.forEach(name => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `<span>${name}</span>`;
            div.addEventListener('click', () => {
                const idx = playlist.findIndex(t => t.name === name);
                if (idx !== -1) loadTrack(idx);
            });
            container.appendChild(div);
        });
    }

    // --- EQ ---
    document.getElementById('btn-eq').addEventListener('click', () => document.getElementById('eq-overlay').classList.add('show'));
    document.getElementById('btn-close-eq').addEventListener('click', () => document.getElementById('eq-overlay').classList.remove('show'));
    document.querySelectorAll('.eq-band').forEach(slider => {
        slider.addEventListener('input', (e) => {
            e.target.nextElementSibling.textContent = `${e.target.value}dB`;
            const filterIndex = eqFilters.findIndex(f => f.frequency.value == e.target.dataset.freq);
            if (filterIndex !== -1) eqFilters[filterIndex].gain.value = e.target.value;
        });
    });

    // --- RADIO ---
    function renderRadioStations() {
        const grid = document.getElementById('radio-grid');
        grid.innerHTML = '';
        radioStations.forEach((station, index) => {
            const div = document.createElement('div');
            div.className = 'radio-station';
            div.id = `radio-${index}`;
            div.innerHTML = `<i class="fas fa-broadcast-tower"></i><div class="radio-name">${station.name}</div><div style="font-size:0.7rem; color:var(--text-dim); margin-top:5px">${station.city}</div>`;
            div.addEventListener('click', () => playRadio(index));
            grid.appendChild(div);
        });
    }

    function playRadio(index) {
        currentStationIndex = index;
        audioRadio.src = radioStations[index].url;
        audioRadio.play().catch(e => {
            alert("Esta emisora bloqueó la reproducción web. Prueba otra.");
            document.getElementById(`radio-${index}`).classList.add('error');
        });
        document.querySelectorAll('.radio-station').forEach(s => s.classList.remove('active'));
        document.getElementById(`radio-${index}`).classList.add('active');
        updatePlayButton('radio', true);
        updateRadioFavIcon();
    }

    audioRadio.addEventListener('error', () => document.getElementById(`radio-${currentStationIndex}`).classList.add('error'));

    document.getElementById('btn-play-radio').addEventListener('click', () => {
        if (audioRadio.src === "" || audioRadio.src === window.location.href) return playRadio(0);
        if (audioRadio.paused) { audioRadio.play(); updatePlayButton('radio', true); }
        else { audioRadio.pause(); updatePlayButton('radio', false); }
    });

    document.getElementById('btn-next-radio').addEventListener('click', () => playRadio((currentStationIndex + 1) % radioStations.length));
    document.getElementById('btn-prev-radio').addEventListener('click', () => playRadio((currentStationIndex - 1 + radioStations.length) % radioStations.length));
    document.getElementById('vol-radio').addEventListener('input', (e) => audioRadio.volume = e.target.value);

    document.getElementById('btn-fav-radio').addEventListener('click', () => {
        const stName = radioStations[currentStationIndex].name;
        const i = favoritesRadio.indexOf(stName);
        if (i > -1) favoritesRadio.splice(i, 1); else favoritesRadio.push(stName);
        localStorage.setItem('favRadio', JSON.stringify(favoritesRadio));
        updateRadioFavIcon();
    });

    function updateRadioFavIcon() {
        const isFav = favoritesRadio.includes(radioStations[currentStationIndex].name);
        document.querySelector('#btn-fav-radio i').className = isFav ? 'fas fa-heart' : 'far fa-heart';
        document.getElementById('btn-fav-radio').classList.toggle('active', isFav);
    }

    // --- UTILS ---
    function updatePlayButton(type, isPlaying) {
        document.getElementById(`btn-play-${type}`).querySelector('i').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }
    function formatTime(sec) {
        if(isNaN(sec)) return "0:00";
        return `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;
    }
    function initMediaSession() {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.setActionHandler('play', () => document.getElementById('sec-music').classList.contains('active') ? audioMusic.play() : audioRadio.play());
        navigator.mediaSession.setActionHandler('pause', () => document.getElementById('sec-music').classList.contains('active') ? audioMusic.pause() : audioRadio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => document.getElementById('sec-music').classList.contains('active') ? document.getElementById('btn-prev').click() : document.getElementById('btn-prev-radio').click());
        navigator.mediaSession.setActionHandler('nexttrack', () => document.getElementById('sec-music').classList.contains('active') ? document.getElementById('btn-next').click() : document.getElementById('btn-next-radio').click());
        audioMusic.addEventListener('play', () => { navigator.mediaSession.metadata = new MediaMetadata({ title: playlist[currentTrackIndex]?.name || 'Waqrapfuko', artist: 'Música Local' }); });
    }
</script>
</body>
</html>
