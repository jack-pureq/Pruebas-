<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Waqrapfuko</title>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #D32F2F; /* Rojo andino */
            --secondary: #FFC107; /* Dorado */
            --bg: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-dim: #AAAAAA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { padding: 15px; text-align: center; background: var(--surface); border-bottom: 1px solid #333; }
        header h1 { font-size: 1.5rem; color: var(--secondary); letter-spacing: 2px; }

        /* Contenido Principal */
        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; align-items: center; }
        .content.active { display: flex; }

        /* Reproductor Música */
        .album-art { width: 200px; height: 200px; background: #333; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: var(--text-dim); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .song-info { text-align: center; margin-bottom: 20px; width: 100%; }
        .song-title { font-size: 1.2rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { color: var(--text-dim); font-size: 0.9rem; }

        /* Vumetro */
        .vumeter-container { display: flex; justify-content: center; gap: 3px; height: 50px; align-items: flex-end; margin-bottom: 20px; }
        .bar { width: 6px; background: var(--secondary); border-radius: 3px; transition: height 0.05s ease; }

        /* Controles */
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .btn:hover, .btn.active { color: var(--secondary); }
        .btn-play { background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4); }

        /* Progress Bar */
        .progress-container { width: 100%; margin-bottom: 15px; }
        .progress-bar { width: 100%; height: 6px; background: #444; border-radius: 3px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; width: 0%; }
        .time-stamps { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); margin-top: 5px; }

        /* Volumen y Extras */
        .extra-controls { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; -webkit-appearance: none; background: #444; height: 4px; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--secondary); border-radius: 50%; cursor: pointer; }

        /* Lista de Canciones */
        .playlist-btn { background: var(--surface); border: 1px solid #333; color: var(--text); padding: 10px; width: 100%; border-radius: 8px; margin-top: 20px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .playlist-container { width: 100%; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .playlist-item { padding: 10px; background: var(--surface); margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .playlist-item:hover { background: #333; }

        /* Sección Radio */
        .radio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .radio-station { background: var(--surface); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .radio-station.active { border-color: var(--primary); background: #2a1010; }
        .radio-station i { font-size: 1.5rem; color: var(--primary); margin-bottom: 5px; display: block; }
        .radio-name { font-size: 0.9rem; font-weight: bold; }

        /* Navegación Inferior */
        nav { background: var(--surface); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item.active { color: var(--secondary); }

        /* Eq Overlay */
        .eq-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .eq-overlay.show { display: flex; }
        .eq-sliders { display: flex; gap: 15px; }
        .eq-slider-group { display: flex; flex-direction: column; align-items: center; }
        .eq-slider-group input[type="range"] { writing-mode: vertical-lr; direction: rtl; height: 100px; width: 6px; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-bullhorn"></i> WAQRAFUKO</h1>
    </header>

    <!-- SECCIÓN MÚSICA -->
    <div id="sec-music" class="content active">
        <div class="album-art"><i class="fas fa-music"></i></div>
        <div class="song-info">
            <div class="song-title" id="song-title">Selecciona tu música</div>
            <div class="song-artist" id="song-artist">Artista desconocido</div>
        </div>

        <div class="vumeter-container" id="vumeter">
            <!-- Barras generadas por JS -->
        </div>

        <div class="controls">
            <button class="btn" id="btn-shuffle" title="Aleatorio"><i class="fas fa-random"></i></button>
            <button class="btn" id="btn-prev"><i class="fas fa-backward"></i></button>
            <button class="btn btn-play" id="btn-play-music"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-next"><i class="fas fa-forward"></i></button>
            <button class="btn" id="btn-fav-music" title="Favorito"><i class="far fa-heart"></i></button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-stamps">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="extra-controls">
            <div class="slider-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="vol-music" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
            <button class="btn" id="btn-eq" style="font-size: 1rem; color: var(--text-dim);"><i class="fas fa-sliders-h"></i> Ecualizador</button>
            <button class="playlist-btn" id="btn-load-files"><i class="fas fa-folder-open"></i> Cargar Música Local</button>
            <input type="file" id="file-input" webkitdirectory directory multiple accept="audio/*" style="display: none;">
            
            <div style="width: 100%; margin-top:15px; display: flex; justify-content: space-between;">
                <span style="color:var(--secondary)">Favoritos:</span>
                <button class="btn" id="btn-show-favs" style="font-size: 0.9rem;"><i class="fas fa-list"></i> Ver Lista</button>
            </div>
            <div class="playlist-container" id="playlist-container"></div>
        </div>
    </div>

    <!-- SECCIÓN RADIO -->
    <div id="sec-radio" class="content">
        <h2 style="margin-bottom: 20px; color: var(--secondary);">Radios de Perú</h2>
        
        <div class="radio-grid" id="radio-grid">
            <!-- Generado por JS -->
        </div>

        <div class="controls">
            <button class="btn" id="btn-prev-radio"><i class="fas fa-backward"></i></button>
            <button class="btn btn-play" id="btn-play-radio"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-next-radio"><i class="fas fa-forward"></i></button>
            <button class="btn" id="btn-fav-radio" title="Favorito"><i class="far fa-heart"></i></button>
        </div>

        <div class="extra-controls" style="margin-top: 20px;">
            <div class="slider-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="vol-radio" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
            <button class="playlist-btn" id="btn-loc-radio"><i class="fas fa-map-marker-alt"></i> Obtener Ubicación (Futuro filtro)</button>
        </div>
    </div>

    <!-- Ecualizador Overlay -->
    <div class="eq-overlay" id="eq-overlay">
        <h2>Ecualizador</h2>
        <div class="eq-sliders">
            <div class="eq-slider-group"><span>60Hz</span><input type="range" class="eq-band" data-freq="60" min="-12" max="12" value="0"><span>0dB</span></div>
            <div class="eq-slider-group"><span>230Hz</span><input type="range" class="eq-band" data-freq="230" min="-12" max="12" value="0"><span>0dB</span></div>
            <div class="eq-slider-group"><span>910Hz</span><input type="range" class="eq-band" data-freq="910" min="-12" max="12" value="0"><span>0dB</span></div>
            <div class="eq-slider-group"><span>4kHz</span><input type="range" class="eq-band" data-freq="4000" min="-12" max="12" value="0"><span>0dB</span></div>
            <div class="eq-slider-group"><span>14kHz</span><input type="range" class="eq-band" data-freq="14000" min="-12" max="12" value="0"><span>0dB</span></div>
        </div>
        <button class="btn" id="btn-close-eq" style="font-size: 1.5rem; color: var(--primary); margin-top: 20px;"><i class="fas fa-times-circle"></i></button>
    </div>

    <!-- Navegación Inferior -->
    <nav>
        <div class="nav-item active" data-sec="sec-music"><i class="fas fa-music"></i>Música</div>
        <div class="nav-item" data-sec="sec-radio"><i class="fas fa-broadcast-tower"></i>Radio</div>
    </nav>

    <!-- Audios ocultos -->
    <audio id="audio-music" preload="auto"></audio>
    <audio id="audio-radio" preload="none"></audio>

<script>
    // --- VARIABLES GLOBALES ---
    const audioMusic = document.getElementById('audio-music');
    const audioRadio = document.getElementById('audio-radio');
    let playlist = [];
    let currentTrackIndex = 0;
    let isShuffle = false;
    let favoritesMusic = JSON.parse(localStorage.getItem('favMusic')) || [];
    let favoritesRadio = JSON.parse(localStorage.getItem('favRadio')) || [];
    let showingFavs = false;

    // Configuración de Web Audio API (Para Vumetro y Ecualizador)
    let audioCtx, analyser, source, eqFilters = [];
    let audioContextInit = false;

    // --- EMISORAS (Ejemplos de Perú) ---
    // NOTA: Algunas emisoras bloquean el streaming por CORS en navegadores. 
    // Si una no funciona, es protección del servidor de la radio.
    const radioStations = [
        { name: "RPP (Lima)", url: "https://streaming.rpp.com.pe/stream/rpp.mp3", city: "Lima" },
        { name: "La Inolvidable", url: "https://streaming.inolvidable.com.pe/radioInolvidable.mp3", city: "Lima" },
        { name: "Moda (Lima)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/RADIOMODA.mp3", city: "Lima" },
        { name: "Panamericana", url: "https://streaming.panamericana.com.pe/radio.panamericana.mp3", city: "Lima" },
        { name: "Z Rock & Pop", url: "https://streaming.zrockandpop.com.pe/zrockandpop.mp3", city: "Lima" },
        { name: "Radio Nacional", url: "https://radionacional-pe.radioca.st/stream", city: "Lima" }
    ];
    let currentStationIndex = 0;

    // --- INICIALIZACIÓN ---
    document.addEventListener('DOMContentLoaded', () => {
        createVumeter();
        renderRadioStations();
        setupEventListeners();
        initMediaSession();
    });

    // --- NAVEGACIÓN ---
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(e.currentTarget.dataset.sec).classList.add('active');
            // Pausar el que no se usa
            if(e.currentTarget.dataset.sec === 'sec-radio') audioMusic.pause();
            if(e.currentTarget.dataset.sec === 'sec-music') audioRadio.pause();
        });
    });

    // --- WEB AUDIO API (VUMETER Y EQ) ---
    function initAudioContext() {
        if (audioContextInit) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(audioMusic);
        
        // Crear EQ (5 bandas)
        const frequencies = [60, 230, 910, 4000, 14000];
        frequencies.forEach(freq => {
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking';
            filter.frequency.value = freq;
            filter.Q.value = 1;
            filter.gain.value = 0;
            eqFilters.push(filter);
        });

        // Conectar: Source -> EQs -> Analyser -> Salida
        source.connect(eqFilters[0]);
        for(let i=0; i<eqFilters.length -1; i++) {
            eqFilters[i].connect(eqFilters[i+1]);
        }
        eqFilters[eqFilters.length - 1].connect(analyser);
        analyser.connect(audioCtx.destination);
        
        audioContextInit = true;
        drawVumeter();
    }

    // --- VUMETER ---
    function createVumeter() {
        const container = document.getElementById('vumeter');
        for(let i=0; i<20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '2px';
            container.appendChild(bar);
        }
    }

    function drawVumeter() {
        if(!analyser) return;
        requestAnimationFrame(drawVumeter);
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        
        const bars = document.querySelectorAll('.bar');
        // Tomamos muestras específicas para que se vea dinámico
        const step = Math.floor(dataArray.length / bars.length);
        
        bars.forEach((bar, index) => {
            const value = dataArray[index * step];
            const height = (value / 255) * 50; // Max 50px de altura
            bar.style.height = `${Math.max(2, height)}px`;
            // Color dinámico (verde a amarillo a rojo)
            if(height < 15) bar.style.background = '#4CAF50';
            else if(height < 35) bar.style.background = '#FFC107';
            else bar.style.background = '#D32F2F';
        });
    }

    // --- CARGA DE MÚSICA LOCAL ---
    document.getElementById('btn-load-files').addEventListener('click', () => {
        document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
        playlist = files.map(file => {
            return { name: file.name.replace(/\.[^/.]+$/, ""), file: file, url: URL.createObjectURL(file) };
        });
        alert(`Se encontraron ${playlist.length} canciones.`);
        if(playlist.length > 0) loadTrack(0);
    });

    function loadTrack(index) {
        if (index < 0 || index >= playlist.length) return;
        currentTrackIndex = index;
        const track = playlist[index];
        
        document.getElementById('song-title').textContent = track.name;
        document.getElementById('song-artist').textContent = "Archivo local";
        
        audioMusic.src = track.url;
        
        // Inicializar contexto de audio con la primera interacción
        initAudioContext();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        audioMusic.play();
        updatePlayButton('music', true);
        updateFavIcon();
    }

    // --- CONTROLES DE MÚSICA ---
    document.getElementById('btn-play-music').addEventListener('click', () => {
        if (playlist.length === 0) return alert("Carga música primero.");
        initAudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (audioMusic.paused) {
            audioMusic.play();
            updatePlayButton('music', true);
        } else {
            audioMusic.pause();
            updatePlayButton('music', false);
        }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        if (playlist.length === 0) return;
        let next = isShuffle ? Math.floor(Math.random() * playlist.length) : currentTrackIndex + 1;
        if (next >= playlist.length) next = 0;
        loadTrack(next);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
        if (playlist.length === 0) return;
        let prev = currentTrackIndex - 1;
        if (prev < 0) prev = playlist.length - 1;
        loadTrack(prev);
    });

    document.getElementById('btn-shuffle').addEventListener('click', (e) => {
        isShuffle = !isShuffle;
        e.currentTarget.classList.toggle('active', isShuffle);
    });

    // Progress Bar
    audioMusic.addEventListener('timeupdate', () => {
        if (audioMusic.duration) {
            const pct = (audioMusic.currentTime / audioMusic.duration) * 100;
            document.getElementById('progress-fill').style.width = `${pct}%`;
            document.getElementById('current-time').textContent = formatTime(audioMusic.currentTime);
            document.getElementById('total-time').textContent = formatTime(audioMusic.duration);
        }
    });

    audioMusic.addEventListener('ended', () => {
        document.getElementById('btn-next').click();
    });

    document.getElementById('progress-bar').addEventListener('click', (e) => {
        const width = e.currentTarget.clientWidth;
        const clickX = e.offsetX;
        const duration = audioMusic.duration;
        audioMusic.currentTime = (clickX / width) * duration;
    });

    document.getElementById('vol-music').addEventListener('input', (e) => {
        audioMusic.volume = e.target.value;
    });

    // --- FAVORITOS MÚSICA ---
    document.getElementById('btn-fav-music').addEventListener('click', () => {
        if (playlist.length === 0) return;
        const trackName = playlist[currentTrackIndex].name;
        const index = favoritesMusic.indexOf(trackName);
        if (index > -1) {
            favoritesMusic.splice(index, 1);
        } else {
            favoritesMusic.push(trackName);
        }
        localStorage.setItem('favMusic', JSON.stringify(favoritesMusic));
        updateFavIcon();
    });

    document.getElementById('btn-show-favs').addEventListener('click', () => {
        showingFavs = !showingFavs;
        renderPlaylist();
    });

    function updateFavIcon() {
        if (playlist.length === 0) return;
        const isFav = favoritesMusic.includes(playlist[currentTrackIndex].name);
        const icon = document.querySelector('#btn-fav-music i');
        icon.className = isFav ? 'fas fa-heart' : 'far fa-heart';
        document.getElementById('btn-fav-music').classList.toggle('active', isFav);
    }

    function renderPlaylist() {
        const container = document.getElementById('playlist-container');
        container.innerHTML = '';
        let listToShow = showingFavs ? favoritesMusic : playlist.map(t => t.name);
        
        if (listToShow.length === 0) {
            container.innerHTML = '<p style="color:var(--text-dim); text-align:center; width:100%">No hay canciones aquí.</p>';
            return;
        }

        listToShow.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `<span>${name}</span>`;
            div.addEventListener('click', () => {
                // Encontrar el índice real en la playlist principal
                const realIndex = playlist.findIndex(t => t.name === name);
                if (realIndex !== -1) loadTrack(realIndex);
            });
            container.appendChild(div);
        });
    }

    // --- ECUALIZADOR ---
    document.getElementById('btn-eq').addEventListener('click', () => {
        document.getElementById('eq-overlay').classList.add('show');
    });
    document.getElementById('btn-close-eq').addEventListener('click', () => {
        document.getElementById('eq-overlay').classList.remove('show');
    });

    document.querySelectorAll('.eq-band').forEach(slider => {
        slider.addEventListener('input', (e) => {
            const freq = e.target.dataset.freq;
            const gain = e.target.value;
            e.target.nextElementSibling.textContent = `${gain}dB`;
            
            const filterIndex = eqFilters.findIndex(f => f.frequency.value == freq);
            if (filterIndex !== -1) {
                eqFilters[filterIndex].gain.value = gain;
            }
        });
    });

    // --- RADIO ---
    function renderRadioStations() {
        const grid = document.getElementById('radio-grid');
        grid.innerHTML = '';
        radioStations.forEach((station, index) => {
            const div = document.createElement('div');
            div.className = 'radio-station';
            div.innerHTML = `<i class="fas fa-broadcast-tower"></i><div class="radio-name">${station.name}</div>`;
            div.addEventListener('click', () => playRadio(index));
            grid.appendChild(div);
        });
    }

    function playRadio(index) {
        currentStationIndex = index;
        const station = radioStations[index];
        
        audioRadio.src = station.url;
        audioRadio.play();
        
        document.querySelectorAll('.radio-station').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.radio-station')[index].classList.add('active');
        
        updatePlayButton('radio', true);
        updateRadioFavIcon();
    }

    document.getElementById('btn-play-radio').addEventListener('click', () => {
        if (audioRadio.src === '') return playRadio(0);
        if (audioRadio.paused) {
            audioRadio.play();
            updatePlayButton('radio', true);
        } else {
            audioRadio.pause();
            updatePlayButton('radio', false);
        }
    });

    document.getElementById('btn-next-radio').addEventListener('click', () => {
        let next = currentStationIndex + 1;
        if (next >= radioStations.length) next = 0;
        playRadio(next);
    });

    document.getElementById('btn-prev-radio').addEventListener('click', () => {
        let prev = currentStationIndex - 1;
        if (prev < 0) prev = radioStations.length - 1;
        playRadio(prev);
    });

    document.getElementById('vol-radio').addEventListener('input', (e) => {
        audioRadio.volume = e.target.value;
    });

    // Favoritos Radio
    document.getElementById('btn-fav-radio').addEventListener('click', () => {
        const stName = radioStations[currentStationIndex].name;
        const index = favoritesRadio.indexOf(stName);
        if (index > -1) favoritesRadio.splice(index, 1);
        else favoritesRadio.push(stName);
        localStorage.setItem('favRadio', JSON.stringify(favoritesRadio));
        updateRadioFavIcon();
    });

    function updateRadioFavIcon() {
        const isFav = favoritesRadio.includes(radioStations[currentStationIndex].name);
        const icon = document.querySelector('#btn-fav-radio i');
        icon.className = isFav ? 'fas fa-heart' : 'far fa-heart';
        document.getElementById('btn-fav-radio').classList.toggle('active', isFav);
    }

    // Botón ubicación (Placeholder por ahora)
    document.getElementById('btn-loc-radio').addEventListener('click', () => {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                alert(`Ubicación obtenida: ${pos.coords.latitude}, ${pos.coords.longitude}\n(En una app real, esto filtraría emisoras cercanas usando una base de datos).`);
            }, err => alert("Error al obtener ubicación."));
        }
    });

    // --- UTILIDADES ---
    function updatePlayButton(type, isPlaying) {
        const icon = document.getElementById(`btn-play-${type}`).querySelector('i');
        icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function formatTime(sec) {
        if(isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // --- MEDIA SESSION (Para controles en pantalla de bloqueo o notificaciones) ---
    function initMediaSession() {
        if (!('mediaSession' in navigator)) return;

        navigator.mediaSession.setActionHandler('play', () => {
            if (document.getElementById('sec-music').classList.contains('active')) audioMusic.play();
            else audioRadio.play();
        });
        navigator.mediaSession.setActionHandler('pause', () => {
            if (document.getElementById('sec-music').classList.contains('active')) audioMusic.pause();
            else audioRadio.pause();
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => {
            if (document.getElementById('sec-music').classList.contains('active')) document.getElementById('btn-prev').click();
            else document.getElementById('btn-prev-radio').click();
        });
        navigator.mediaSession.setActionHandler('nexttrack', () => {
            if (document.getElementById('sec-music').classList.contains('active')) document.getElementById('btn-next').click();
            else document.getElementById('btn-next-radio').click();
        });

        // Actualizar metadatos
        audioMusic.addEventListener('play', () => {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: playlist[currentTrackIndex]?.name || 'Waqrapfuko',
                artist: 'Música Local',
                album: 'Waqrapfuko App'
            });
        });
    }
</script>
